name: Build TWRP for Lenovo Tab Plus (TB351FU)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build TWRP by ${{ github.actor }}
    runs-on: ubuntu-20.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - name: Checkout Device Tree
      uses: actions/checkout@v3
      with:
        path: device/lenovo/TB351FU

    - name: Prepare the Build Environment
      run: |
        sudo apt-get update
        sudo apt-get -y install gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib libc6-dev lib32ncurses5-dev x11proto-core-dev libx11-dev tree lib32z-dev libgl1-mesa-dev libxml2-utils xsltproc bc ccache lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libwxgtk3.0-gtk3-dev libxml2 lzop pngcrush schedtool squashfs-tools imagemagick libbz2-dev lzma ncftp qemu-user-static libstdc++-10-dev libncurses5
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo
        
    - name: Sync TWRP Minimal Manifest
      run: |
        mkdir workspace
        cd workspace
        echo "Workspace Directory: $(pwd)"
        git config --global user.name "actions"
        git config --global user.email "actions@github.com"
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
        repo sync -c -j8 --force-sync --no-clone-bundle --no-tags
        
    - name: Move Device Tree to Workspace
      run: |
        cp -r device workspace/
        
    - name: Compile TWRP (Vendor Boot)
      run: |
        cd workspace
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch twrp_TB351FU-eng
        mka vendorbootimage
        
    - name: Upload TWRP Release
      uses: actions/upload-artifact@v3
      with:
        name: TWRP_Lenovo_TB351FU_vendor_boot.img
        path: workspace/out/target/product/TB351FU/vendor_boot.img
